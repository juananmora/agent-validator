name: Agent Validation

on:
  pull_request:
    paths:
      - 'agents/*.md'
    branches:
      - main
  push:
    paths:
      - 'agents/*.md'
    branches:
      - main
  workflow_dispatch:
    inputs:
      agent_file:
        description: 'Nombre del agente a validar (ej: python_expert.md)'
        required: false
        default: ''
      threshold:
        description: 'Score mínimo para pasar (0-100)'
        required: false
        default: '70'
      model:
        description: 'Modelo LLM a usar (ej: gpt-4o, gpt-4o-mini, claude-sonnet-4)'
        required: false
        default: 'gpt-4o'

env:
  QUALITY_THRESHOLD: ${{ github.event.inputs.threshold || '70' }}
  ENABLE_LLM_JUDGE: 'true'
  MODEL: ${{ github.event.inputs.model || 'gpt-4o' }}

jobs:
  validate-agents:
    name: 🔍 Validate Agents
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      # ============================================
      # 1. SETUP
      # ============================================
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: 🔐 Validate COPILOT_GITHUB_TOKEN secret
        run: |
          if [ -z "$COPILOT_GITHUB_TOKEN" ]; then
            echo "❌ COPILOT_GITHUB_TOKEN secret is not set"
            echo "Please add COPILOT_GITHUB_TOKEN to your repository secrets"
            echo "You can get this token from GitHub Copilot settings"
            exit 1
          fi
          echo "✅ COPILOT_GITHUB_TOKEN is configured"
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          
      - name: 🤖 Install GitHub Copilot CLI
        run: |
          # Download official Copilot CLI installer script
          curl -fsSL https://raw.githubusercontent.com/github/copilot-cli/main/install.sh -o /tmp/copilot-install.sh
          
          # Execute the installer with the specified version
          export VERSION=0.0.375 && sudo bash /tmp/copilot-install.sh
          
          # Cleanup
          rm -f /tmp/copilot-install.sh
          
          # Verify installation
          copilot --version
          
          # Set COPILOT_CLI_PATH for the SDK
          echo "COPILOT_CLI_PATH=/usr/local/bin/copilot" >> $GITHUB_ENV
          
      - name: ✅ Verify Copilot SDK installation
        run: |
          python -c "from copilot import CopilotClient; print('✅ Copilot SDK imported successfully')"
          echo "Copilot CLI path: $(which copilot)"

      # ============================================
      # 2. DETECT CHANGED AGENTS
      # ============================================
      - name: 🔎 Detect changed agents
        id: detect
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.agent_file }}" ]; then
            # Manual dispatch con agente específico
            AGENTS="${{ github.event.inputs.agent_file }}"
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            # Obtener archivos modificados en la PR
            AGENTS=$(gh pr view ${{ github.event.pull_request.number }} --json files -q '.files[].path' | grep '^agents/.*\.md$' | xargs -I {} basename {} || true)
          else
            # Push: obtener archivos del último commit
            AGENTS=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep '^agents/.*\.md$' | xargs -I {} basename {} || true)
          fi
          
          # Si no hay agentes modificados, validar todos (excluyendo archivos .report.md)
          if [ -z "$AGENTS" ]; then
            AGENTS=$(ls agents/*.md 2>/dev/null | grep -v '\.report\.md$' | xargs -I {} basename {} || echo "")
          fi
          
          # Filter out any .report.md files that might have been included
          AGENTS=$(echo "$AGENTS" | tr ' ' '\n' | grep -v '\.report\.md$' | tr '\n' ' ' | xargs)
          
          # Use heredoc delimiter for multi-line output (handles filenames with dots)
          {
            echo 'agents<<AGENTS_EOF'
            echo "$AGENTS"
            echo 'AGENTS_EOF'
          } >> $GITHUB_OUTPUT
          
          echo "### 📋 Agentes a validar:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for agent in $AGENTS; do
            echo "- \`$agent\`" >> $GITHUB_STEP_SUMMARY
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ============================================
      # 3. RUN VALIDATION
      # ============================================
      - name: 🧪 Run Agent Validator
        id: validate
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          COPILOT_CLI_PATH: /usr/local/bin/copilot
        run: |
          set -x  # Enable command tracing
          
          echo "=========================================="
          echo "🚀 Starting Agent Validation Process"
          echo "=========================================="
          echo "📅 Timestamp: $(date)"
          echo "📁 Working directory: $(pwd)"
          echo "🐍 Python version: $(python --version)"
          echo ""
          
          AGENTS="${{ steps.detect.outputs.agents }}"
          echo "📋 Agents to validate: $AGENTS"
          echo ""
          
          RESULTS_DIR="validation_results"
          mkdir -p $RESULTS_DIR
          echo "📂 Results directory created: $RESULTS_DIR"
          
          OVERALL_PASSED=true
          SUMMARY=""
          AGENT_COUNT=0
          TOTAL_AGENTS=$(echo "$AGENTS" | wc -w)
          
          echo "📊 Total agents to process: $TOTAL_AGENTS"
          echo ""
          
          for agent in $AGENTS; do
            AGENT_COUNT=$((AGENT_COUNT + 1))
            AGENT_PATH="agents/$agent"
            
            echo "=========================================="
            echo "🔄 [$AGENT_COUNT/$TOTAL_AGENTS] Validating: $agent"
            echo "=========================================="
            echo "📄 Agent path: $AGENT_PATH"
            echo "⏰ Start time: $(date +%H:%M:%S)"
            
            if [ -f "$AGENT_PATH" ]; then
              echo "✅ Agent file exists"
              echo "📏 File size: $(wc -c < "$AGENT_PATH") bytes"
              echo ""
              echo "🔧 Running validator with:"
              echo "   --threshold: ${{ env.QUALITY_THRESHOLD }}"
              echo "   --llm-judge: ${{ env.ENABLE_LLM_JUDGE }}"
              echo "   --model: ${{ env.MODEL }}"
              echo "   --output: $RESULTS_DIR/${agent%.md}.json"
              echo ""
              echo ">>> Validator output start <<<"
              
              # Ejecutar validador con unbuffered output
              python -u agent_validator.py "$AGENT_PATH" \
                --threshold ${{ env.QUALITY_THRESHOLD }} \
                --llm-judge ${{ env.ENABLE_LLM_JUDGE }} \
                --model ${{ env.MODEL }} \
                --output "$RESULTS_DIR/${agent%.md}.json" \
                --verbose \
                2>&1 | tee "$RESULTS_DIR/${agent%.md}.log" || true
              
              echo ">>> Validator output end <<<"
              echo "⏰ End time: $(date +%H:%M:%S)"
              
              # Verificar resultado
              echo ""
              echo "📊 Checking validation results..."
              if [ -f "$RESULTS_DIR/${agent%.md}.json" ]; then
                echo "✅ JSON result file created"
                SCORE=$(python -c "import json; print(json.load(open('$RESULTS_DIR/${agent%.md}.json'))['score'])" 2>/dev/null || echo "0")
                PASSED=$(python -c "score=$SCORE; threshold=${{ env.QUALITY_THRESHOLD }}; print('true' if score >= threshold else 'false')")
                
                echo "📈 Score: $SCORE"
                echo "🎯 Threshold: ${{ env.QUALITY_THRESHOLD }}"
                echo "✅ Passed: $PASSED"
                
                if [ "$PASSED" == "false" ]; then
                  OVERALL_PASSED=false
                  echo "❌ Agent did NOT pass quality gate"
                else
                  echo "✅ Agent passed quality gate"
                fi
                
                SUMMARY="$SUMMARY\n| $agent | $SCORE | $PASSED |"
              else
                echo "❌ JSON result file NOT created - validation failed"
                echo "📋 Log file contents:"
                cat "$RESULTS_DIR/${agent%.md}.log" 2>/dev/null || echo "(no log file)"
                OVERALL_PASSED=false
                SUMMARY="$SUMMARY\n| $agent | ERROR | false |"
              fi
            else
              echo "❌ Agent file does NOT exist: $AGENT_PATH"
            fi
            echo ""
          done
          
          echo "=========================================="
          echo "🏁 Validation Complete"
          echo "=========================================="
          echo "📊 Overall passed: $OVERALL_PASSED"
          echo "passed=$OVERALL_PASSED" >> $GITHUB_OUTPUT
          echo -e "$SUMMARY" > "$RESULTS_DIR/summary.txt"
          
      - name: 📊 Upload validation reports
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: validation_results/
          retention-days: 30

      # ============================================
      # 4. PR COMMENT
      # ============================================
      - name: 💬 Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const resultsDir = 'validation_results';
            const threshold = ${{ env.QUALITY_THRESHOLD }};
            let overallPassed = true;
            let totalScore = 0;
            let agentCount = 0;
            
            let reportContent = `## 🤖 Agent Validation Report\n\n`;
            reportContent += `**Quality Gate Threshold:** ${threshold}/100\n\n`;
            
            // Leer resultados JSON
            const files = fs.readdirSync(resultsDir).filter(f => f.endsWith('.json'));
            
            // Resumen ejecutivo
            reportContent += `### 📊 Executive Summary\n\n`;
            reportContent += `| Agent | Score | Tests | Status |\n`;
            reportContent += `|-------|-------|-------|--------|\n`;
            
            const agentDetails = [];
            
            for (const file of files) {
              try {
                const data = JSON.parse(fs.readFileSync(path.join(resultsDir, file), 'utf8'));
                const agentName = file.replace('.json', '');
                const score = data.score || 0;
                const passed = score >= threshold;
                const status = passed ? '✅ PASSED' : '❌ FAILED';
                const testsPassed = data.passed_tests || 0;
                const testsTotal = data.total_tests || 0;
                
                totalScore += score;
                agentCount++;
                if (!passed) overallPassed = false;
                
                reportContent += `| \`${agentName}\` | **${score.toFixed(1)}** | ${testsPassed}/${testsTotal} | ${status} |\n`;
                
                // Guardar detalles para después
                agentDetails.push({ agentName, data, passed, score });
              } catch (e) {
                console.error(`Error reading ${file}: ${e.message}`);
                overallPassed = false;
              }
            }
            
            // Promedio de score
            if (agentCount > 0) {
              const avgScore = (totalScore / agentCount).toFixed(1);
              reportContent += `\n**Average Score:** ${avgScore}/100\n`;
            }
            
            // Detalles por agente
            reportContent += `\n---\n\n### 📋 Detailed Results\n\n`;
            
            for (const { agentName, data, passed, score } of agentDetails) {
              const statusIcon = passed ? '✅' : '❌';
              reportContent += `<details>\n<summary>${statusIcon} <strong>${agentName}</strong> — Score: ${score.toFixed(1)}/100</summary>\n\n`;
              
              // Métricas generales
              reportContent += `#### 📈 Metrics\n\n`;
              reportContent += `| Metric | Value |\n`;
              reportContent += `|--------|-------|\n`;
              reportContent += `| Tests Passed | ${data.passed_tests || 0}/${data.total_tests || 0} |\n`;
              reportContent += `| Success Rate | ${data.success_rate ? data.success_rate.toFixed(1) : 0}% |\n`;
              reportContent += `| Avg Latency | ${data.avg_latency_ms ? Math.round(data.avg_latency_ms) : 'N/A'}ms |\n`;
              reportContent += `| Quality Gate | ${passed ? '✅ Passed' : '❌ Failed'} |\n`;
              reportContent += `\n`;
              
              // Resultados por test
              if (data.results && data.results.length > 0) {
                reportContent += `#### 🧪 Test Results\n\n`;
                reportContent += `| Test | LLM Score | Latency | Status |\n`;
                reportContent += `|------|-----------|---------|--------|\n`;
                
                for (const test of data.results) {
                  const testStatus = test.passed ? '✅' : '❌';
                  const llmScore = test.llm_score ? `${test.llm_score.toFixed(0)}/100` : 'N/A';
                  const latency = test.latency_ms ? `${Math.round(test.latency_ms)}ms` : 'N/A';
                  reportContent += `| \`${test.test_name}\` | ${llmScore} | ${latency} | ${testStatus} |\n`;
                }
                reportContent += `\n`;
                
                // Detalles de tests fallidos
                const failedTests = data.results.filter(t => !t.passed);
                if (failedTests.length > 0) {
                  reportContent += `#### ⚠️ Issues Detected\n\n`;
                  
                  for (const test of failedTests) {
                    reportContent += `**${test.test_name}:**\n`;
                    
                    if (test.contains_failed && test.contains_failed.length > 0) {
                      reportContent += `- Missing keywords: \`${test.contains_failed.join('`, `')}\`\n`;
                    }
                    if (test.not_contains_failed && test.not_contains_failed.length > 0) {
                      reportContent += `- 🔴 Forbidden patterns found: \`${test.not_contains_failed.join('`, `')}\`\n`;
                    }
                    if (test.llm_reasoning) {
                      reportContent += `- LLM Analysis: ${test.llm_reasoning}\n`;
                    }
                    reportContent += `\n`;
                  }
                }
                
                // Tests exitosos con detalles
                const passedTests = data.results.filter(t => t.passed);
                if (passedTests.length > 0) {
                  reportContent += `#### ✅ Passed Tests Details\n\n`;
                  for (const test of passedTests) {
                    if (test.llm_reasoning) {
                      reportContent += `- **${test.test_name}**: ${test.llm_reasoning}\n`;
                    }
                  }
                  reportContent += `\n`;
                }
              }
              
              reportContent += `</details>\n\n`;
            }
            
            // Estado final con recomendaciones
            reportContent += `---\n\n`;
            reportContent += `### 🎯 Final Status\n\n`;
            
            if (overallPassed) {
              reportContent += `✅ **QUALITY GATE PASSED**\n\n`;
              reportContent += `All agents meet the quality threshold of ${threshold}/100.\n`;
            } else {
              reportContent += `❌ **QUALITY GATE FAILED**\n\n`;
              reportContent += `> ⚠️ One or more agents did not meet the quality threshold (${threshold}/100).\n\n`;
              
              reportContent += `#### 📝 Recommendations\n\n`;
              reportContent += `1. Review the failed tests and their LLM analysis\n`;
              reportContent += `2. Check for missing required keywords in agent responses\n`;
              reportContent += `3. Ensure no forbidden patterns (SQL injection, etc.) are used\n`;
              reportContent += `4. Consider improving the agent prompt to be more explicit\n`;
            }
            
            reportContent += `\n---\n`;
            reportContent += `<sub>Generated by Agent Validator • Threshold: ${threshold} • Agents: ${agentCount}</sub>\n`;
            
            // Buscar comentario existente
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(c => 
              c.user.type === 'Bot' && 
              c.body.includes('Agent Validation Report')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: reportContent
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: reportContent
              });
            }

      # ============================================
      # 5. QUALITY GATE
      # ============================================
      - name: 🚦 Quality Gate Check
        run: |
          if [ "${{ steps.validate.outputs.passed }}" == "false" ]; then
            echo "❌ Quality Gate FAILED - One or more agents did not meet the threshold (${{ env.QUALITY_THRESHOLD }})"
            echo "### ❌ Quality Gate FAILED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "One or more agents scored below the threshold of ${{ env.QUALITY_THRESHOLD }}." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ Quality Gate PASSED - All agents meet the quality threshold"
            echo "### ✅ Quality Gate PASSED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All validated agents scored >= ${{ env.QUALITY_THRESHOLD }}." >> $GITHUB_STEP_SUMMARY
          fi

      # ============================================
      # 6. HISTORICAL COMPARISON (Optional)
      # ============================================
      - name: 📈 Historical Comparison
        if: success() || failure()
        run: |
          echo "### 📈 Historical Comparison" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          for json_file in validation_results/*.json; do
            if [ -f "$json_file" ]; then
              agent=$(basename "$json_file" .json)
              history_file="agents/history/${agent}_latest.json"
              
              if [ -f "$history_file" ]; then
                PREV_SCORE=$(python -c "import json; print(json.load(open('$history_file'))['score'])" 2>/dev/null || echo "0")
                CURR_SCORE=$(python -c "import json; print(json.load(open('$json_file'))['score'])" 2>/dev/null || echo "0")
                
                DIFF=$(python -c "print(round($CURR_SCORE - $PREV_SCORE, 1))")
                
                if [ $(echo "$DIFF > 0" | bc -l) -eq 1 ]; then
                  echo "- **$agent**: $CURR_SCORE (📈 +$DIFF improvement)" >> $GITHUB_STEP_SUMMARY
                elif [ $(echo "$DIFF < 0" | bc -l) -eq 1 ]; then
                  echo "- **$agent**: $CURR_SCORE (📉 $DIFF regression)" >> $GITHUB_STEP_SUMMARY
                else
                  echo "- **$agent**: $CURR_SCORE (➡️ no change)" >> $GITHUB_STEP_SUMMARY
                fi
              else
                echo "- **$agent**: New agent (no history)" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done
